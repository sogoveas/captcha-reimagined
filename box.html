<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>schrodinger security — select the box</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .widget { width: 420px; }

        .prompt-block {
            padding: 14px 16px;
            border-bottom: 1px solid #f6edbd1a;
        }

        .prompt-block p {
            margin: 0;
            font-size: 16px;
            letter-spacing: 0.1em;
            color: #f6edbd;
            text-transform: uppercase;
        }

        .prompt-sub {
            font-size: 9px !important;
            color: #f6edbd !important;
            letter-spacing: 0.2em !important;
            margin-top: 5px !important;
        }

        .error-msg {
            font-size: 9px;
            color: #780507;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 5px;
            display: none;
        }

        /* 3×2 image grid */
        .box-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border-bottom: 1px solid #f6edbd1a;
        }

        .box-cell {
            aspect-ratio: 1;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            border: 1px solid #f6edbd0d;
            transition: border-color 0.15s;
        }

        .box-cell:hover { border-color: #780507; z-index: 2; }

        .box-cell.selected {
            border: 2px solid #f6edbd;
            box-shadow: inset 0 0 0 1px #780507;
        }

        .box-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(30%) sepia(15%);
            transition: filter 0.15s;
        }

        .box-cell:hover img { filter: grayscale(10%) sepia(25%); }

        .tick {
            display: none;
            position: absolute;
            top: 6px; left: 6px;
            background: #780507;
            color: #f6edbd;
            font-size: 11px;
            width: 18px; height: 18px;
            align-items: center;
            justify-content: center;
            border: 1px solid #f6edbd;
        }

        .box-cell.selected .tick { display: flex; }

        .widget-actions {
            padding: 10px 16px;
            border-top: 1px solid #f6edbd1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .widget-actions-left {
            font-size: 9px;
            letter-spacing: 0.12em;
            color: #f6edbd2a;
            text-transform: uppercase;
            line-height: 1.6;
        }

        .widget-icons {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .widget-icons span {
            font-size: 16px;
            cursor: pointer;
            color: #f6edbd33;
            transition: color 0.15s;
        }

        .widget-icons span:hover { color: #f6edbd; }
    </style>
</head>
<body>

    <div class="site-header">
        <span class="site-header-brand">☠ schrodinger security inc.</span>
        <div class="site-header-right">
            <div class="progress-track">
                <div class="pip done"></div>
                <div class="pip now"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
            </div>
            step 2 of 5
        </div>
    </div>

    <div class="widget">
        <div class="prompt-block">
            <p>select the box containing the cat</p>
            <p class="prompt-sub">click all that apply</p>
            <p class="error-msg" id="error-msg">please select at least one box</p>
        </div>

        <div class="box-grid">
            <div class="box-cell" onclick="toggle(this)">
                <img src="images/19th-century-box.png" alt="">
                <div class="tick">✓</div>
            </div>
            <div class="box-cell" onclick="toggle(this)">
                <img src="images/19th-century-box.png" alt="">
                <div class="tick">✓</div>
            </div>
            <div class="box-cell" onclick="toggle(this)">
                <img src="images/19th-century-box.png" alt="">
                <div class="tick">✓</div>
            </div>
            <div class="box-cell" onclick="toggle(this)">
                <img src="images/19th-century-box.png" alt="">
                <div class="tick">✓</div>
            </div>
            <div class="box-cell" onclick="toggle(this)">
                <img src="images/19th-century-box.png" alt="">
                <div class="tick">✓</div>
            </div>
            <div class="box-cell" onclick="toggle(this)">
                <img src="images/19th-century-box.png" alt="">
                <div class="tick">✓</div>
            </div>
        </div>

        <div class="widget-actions">

            <div class="widget-icons">
                <span title="refresh challenge" onclick="refresh()">↺</span>
                <span title="audio challenge">♪</span>
            </div>
            <button class="verify-btn" onclick="handleVerify()">verify</button>
        </div>
    </div>

    <script>
        function toggle(cell) {
            cell.classList.toggle('selected');
            document.getElementById('error-msg').style.display = 'none';
        }

        function handleVerify() {
            const selected = document.querySelectorAll('.box-cell.selected');
            if (selected.length > 0) {
                window.location.href = 'cat-in-box.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function refresh() {
            document.querySelectorAll('.box-cell').forEach(c => c.classList.remove('selected'));
            document.getElementById('error-msg').style.display = 'none';
        }
    </script>
</body>
</html>
