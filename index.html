<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>schrodinger security — welcome</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .widget { width: 400px; }

        .cat-block {
            padding: 20px 16px;
            border-bottom: 1px solid #f6edbd1a;
            text-align: center;
        }

        .subject-label {
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #f6edbd;
            margin: 0 0 14px 0;
        }

        .cat-img {
            height: 180px;
            width: auto;
            display: block;
            margin: 0 auto;
            filter: grayscale(20%) sepia(10%);
        }

        .wanted-title {
            font-family: 'oleo';
            font-size: 28px;
            color: #f6edbd;
            margin: 14px 0 2px 0;
            line-height: 1;
        }

        .wanted-sub {
            font-family: 'oleo';
            font-size: 16px;
            color: #780507;
            margin: 0;
        }

        .terms-block {
            padding: 14px 16px;
        }

        .terms-prompt {
            font-size: 11px;
            letter-spacing: 0.15em;
            color: #f6edbd66;
            text-transform: uppercase;
            margin: 0 0 12px 0;
        }

        .terms-btns {
            display: flex;
            gap: 8px;
        }

        .terms-btns button {
            flex: 1;
            font-family: 'typewriter', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            padding: 8px;
            border: 1px solid #f6edbd2a;
            background: transparent;
            color: #f6edbd55;
            transition: all 0.15s;
        }

        .terms-btns button.yes:hover {
            background: #780507;
            border-color: #780507;
            color: #f6edbd;
        }

        .terms-btns button.no:hover {
            color: #f6edbd33;
        }

        .error-msg {
            font-size: 10px;
            color: #780507;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin: 8px 0 0 0;
            display: none;
        }
    </style>
</head>
<body>

    <div class="site-header">
        <span class="site-header-brand">☠ schrodinger security inc.</span>
        <div class="site-header-right">
            <div class="progress-track">
                <div class="pip now"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
            </div>
            step 1 of 5
        </div>
    </div>

    <div class="widget">
        <div class="widget-header">
          
        </div>

        <div class="cat-block">
            <p class="subject-label">subject on file</p>
            <img class="cat-img" src="images/tub-cat.png" alt="the cat">
            <p class="wanted-title">have you seen these cats?</p>
            <br>
            <p class="wanted-sub">WANTED — dead or alive</p>
        </div>

        <div class="terms-block">
            <p class="terms-prompt">do you agree to all terms and conditions?</p>
            <div class="terms-btns">
                <button class="yes" onclick="window.location.href='box.html'">yes, proceed</button>
                <button class="no" id="no-btn" onclick="handleNo()">no</button>
            </div>
            <p class="error-msg" id="error-msg">you must agree to proceed.</p>
        </div>
    </div>

    <script>
        function handleNo() {
            const msg = document.getElementById('error-msg');
            const btn = document.getElementById('no-btn');
            msg.style.display = 'block';
            btn.style.display = 'none';
        }
    </script>
</body>
</html>
