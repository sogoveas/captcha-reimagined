<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>

    <style>
        .sleeping-cat {
            position: fixed;
            bottom: 0;
            right: 0;
        }

        .sleeping-cat img {
            height: 400px;
            width: auto;
        }

        .text-block {
            display: inline-block;
            margin-top: 200px;
            margin-left: 200px;
        }

        .access-denied {
            color: #400103;
            font-family: 'oleo';
            font-size: 60px;
            margin: 0;
        }

        .user-state {
            color: #f6edbd;
            font-family: 'oleo';
            font-size: 40px;
            margin: 0;
        }

        h1, h3 {
            margin: 0;
        }

        @font-face {
            font-family: 'ghost';
            src: url('fonts/Scary Ghost.otf');
        }

        @font-face {
            font-family: 'oleo';
            src: url('fonts/OleoScriptSwashCaps-Regular.ttf');
        }
    </style>
</head>
<body>
    <div class="text-block">
        <div class="access-denied">
            <h1>ACCESS DENIED!</h1>
        </div>

        <div class="user-state">
            <h3>cannot confirm the state of the user</h3>
        </div>
    </div>

    <div class="sleeping-cat">
        <img src="images/sleeping-cat.png" alt="">
    </div>
</body>
</html>
