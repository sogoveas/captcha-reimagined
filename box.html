<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>all the boxes</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: #f6edbd;
            font-family: 'typewriter';
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .captcha-widget {
            border: 2px solid #f6edbd;
            background-color: #0a0a0a;
            width: 460px;
        }

        .captcha-header {
            font-size: 11px;
            letter-spacing: 3px;
            color: #780507;
            text-transform: uppercase;
            padding: 10px 15px;
            border-bottom: 1px solid #f6edbd33;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .captcha-header span {
            font-size: 10px;
            color: #f6edbd44;
            letter-spacing: 1px;
        }

        .captcha-prompt {
            padding: 12px 15px;
            font-size: 18px;
            letter-spacing: 1px;
            border-bottom: 1px solid #f6edbd33;
            color: #f6edbd;
        }

        .captcha-prompt p {
            margin: 0;
        }

        .captcha-sub {
            font-size: 10px;
            color: #f6edbd66;
            letter-spacing: 2px;
            margin-top: 4px !important;
        }

        .captcha-error {
            font-size: 10px;
            color: #780507;
            letter-spacing: 2px;
            margin-top: 4px !important;
            display: none;
        }

        .boxes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            border-bottom: 1px solid #f6edbd33;
        }

        .box-cell {
            border: 1px solid #f6edbd22;
            aspect-ratio: 1;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: all 0.15s ease;
        }

        .box-cell:hover {
            border-color: #780507;
            z-index: 2;
        }

        .box-cell.selected {
            border: 3px solid #f6edbd;
            box-shadow: inset 0 0 0 2px #780507;
        }

        .box-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(20%);
            transition: filter 0.15s ease;
        }

        .box-cell:hover img {
            filter: grayscale(0%) sepia(20%);
        }

        .box-cell .tick {
            display: none;
            position: absolute;
            top: 6px;
            left: 6px;
            background: #780507;
            color: #f6edbd;
            font-size: 12px;
            width: 20px;
            height: 20px;
            align-items: center;
            justify-content: center;
            border: 1px solid #f6edbd;
        }

        .box-cell.selected .tick {
            display: flex;
        }

        .captcha-footer {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .captcha-footer-left {
            font-size: 9px;
            color: #f6edbd33;
            letter-spacing: 1px;
            line-height: 1.6;
            text-transform: uppercase;
        }

        .captcha-icons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .captcha-icons span {
            font-size: 18px;
            cursor: pointer;
            color: #f6edbd44;
            transition: color 0.2s;
        }

        .captcha-icons span:hover {
            color: #f6edbd;
        }

        .verify-btn {
            font-size: 14px;
            color: #f6edbd;
            background-color: transparent;
            border: 2px solid #f6edbd;
            padding: 6px 18px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.15s ease;
        }

        .verify-btn:hover {
            background-color: #780507;
            transform: translate(-1px, -1px);
        }

        .verify-btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        @font-face {
            font-family: 'typewriter';
            src: url('fonts/JMH\ Typewriter-Thin.ttf');
        }
    </style>
</head>
<body>

    <div class="captcha-widget">

        <div class="captcha-header">
            ☠ schrodinger security inc.
            <span>v2.4.∞</span>
        </div>

        <div class="captcha-prompt">
            <p>select the box containing the cat</p>
            <p class="captcha-error" id="error-msg">please select at least one box</p>
        </div>

        <div class="boxes">
            <div class="box-cell" onclick="toggleSelect(this)">
                <img src="images/19th-century-box.png" alt="">
                <div class="tick">✓</div>
            </div>
            <div class="box-cell" onclick="toggleSelect(this)">
                <img src="images/19th-century-box.png" alt="">
                <div class="tick">✓</div>
            </div>
            <div class="box-cell" onclick="toggleSelect(this)">
                <img src="images/19th-century-box.png" alt="">
                <div class="tick">✓</div>
            </div>
            <div class="box-cell" onclick="toggleSelect(this)">
                <img src="images/19th-century-box.png" alt="">
                <div class="tick">✓</div>
            </div>
            <div class="box-cell" onclick="toggleSelect(this)">
                <img src="images/19th-century-box.png" alt="">
                <div class="tick">✓</div>
            </div>
            <div class="box-cell" onclick="toggleSelect(this)">
                <img src="images/19th-century-box.png" alt="">
                <div class="tick">✓</div>
            </div>
        </div>

        <div class="captcha-footer">
            <div class="captcha-footer-left">
                protected by<br>quantum uncertainty
            </div>
            <div class="captcha-icons">
                <span title="refresh challenge">↺</span>
                <span title="audio challenge">♪</span>
                <span title="help">?</span>
            </div>
            <button class="verify-btn" onclick="handleVerify()">verify</button>
        </div>

    </div>

    <script>
        function toggleSelect(cell) {
            cell.classList.toggle('selected');
            document.getElementById('error-msg').style.display = 'none';
        }

        function handleVerify() {
            const selected = document.querySelectorAll('.box-cell.selected');
            const error = document.getElementById('error-msg');
            if (selected.length > 0) {
                window.location.href = 'cat-in-box.html';
            } else {
                error.style.display = 'block';
            }
        }
    </script>
</body>
</html>
