<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>schrodinger security — confirm state</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .widget { width: 400px; }

        .prompt-block {
            padding: 16px 16px 12px 16px;
            border-bottom: 1px solid #f6edbd1a;
        }

        .prompt-text {
            font-size: 14px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #f6edbd;
            margin: 0 0 4px 0;
        }

        .prompt-sub {
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #f6edbd2a;
            margin: 0;
        }

        .options-block {
            padding: 6px 16px;
            border-bottom: 1px solid #f6edbd1a;
        }

        .cat-thumb {
            height: 50px;
            width: auto;
            margin-right: 4px;
            filter: grayscale(30%) sepia(15%);
            opacity: 0.7;
            transition: opacity 0.15s;
        }

        .option-row:hover .cat-thumb { opacity: 1; }

        .widget-actions {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .widget-actions-left {
            font-size: 9px;
            letter-spacing: 0.12em;
            color: #f6edbd2a;
            text-transform: uppercase;
            line-height: 1.6;
        }

        .widget-footer-icons { display: flex; gap: 14px; }
        .widget-footer-icons span {
            font-size: 16px;
            cursor: pointer;
            color: #f6edbd33;
            transition: color 0.15s;
        }
        .widget-footer-icons span:hover { color: #f6edbd; }
    </style>
</head>
<body>

    <div class="site-header">
        <span class="site-header-brand">☠ schrodinger security inc.</span>
        <div class="site-header-right">
            <div class="progress-track">
                <div class="pip done"></div>
                <div class="pip done"></div>
                <div class="pip done"></div>
                <div class="pip now"></div>
                <div class="pip"></div>
            </div>
            step 4 of 5
        </div>
    </div>

    <div class="widget">
        <div class="prompt-block">
            <p class="prompt-text">confirm the state of the cat</p>
            <p class="prompt-sub">select one to proceed</p>
        </div>

        <div class="options-block">
            <a href="access-denied.html" class="option-row">
                <div class="radio-dot"></div>
                alive
            </a>
            <a href="access-denied.html" class="option-row">
                <div class="radio-dot"></div>
                dead
            </a>
            <a href="access-denied.html" class="option-row">
                <div class="radio-dot"></div>
                alive and/or dead
            </a>
        </div>
    </div>

    <div class="site-footer">
        <span>session id: ∞-∞-∞-∞</span>
        <span>quantum uncertainty protocol v2.4</span>
        <span>schrodinger security inc.</span>
    </div>

</body>
</html>
