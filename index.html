<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanted Cat</title>

    <style>
        body {
            background-color: black;
            margin: 0;
        }

        .welcome-text {
            text-align: center;
            color: #780507;
            font-family: 'ghost';
            font-size: 70px;
            margin-top: 80px;
            margin-bottom: 0;
        }

        .welcome-text p,
        .wanted-text p,
        .dead-or-alive p {
            margin: 0;
        }

        .index-cat {
            display: flex;
            justify-content: center;
            margin: 0;
        }

        .index-cat img {
            height: 300px;
            width: auto;
            display: block;
        }

        .wanted-text {
            text-align: center;
            font-size: 40px;
            font-family: 'ghost';
            color: #f6edbd;
            margin: 0;
        }

        .dead-or-alive {
            text-align: center;
            font-size: 60px;
            font-family: 'ghost';
            color: #f6edbd;
            margin: 0;
        }

        .arrow {
            position: fixed;
            bottom: 25px;
            right: 30px;
            font-size: 50px;
            color: #f6edbd;
            text-decoration: none;
            font-family: 'ghost';
        }

        .arrow:hover {
            color: #780507;
        }

        @font-face {
            font-family: 'ghost';
            src: url('fonts/Scary Ghost.otf');
        }
    </style>
</head>

<body>

    <div class="welcome-text">
        <p>WELCOME</p>
    </div>

    <div class="index-cat">
        <img src="images/tub-cat.png" alt="wanted cat">
    </div>

    <div class="wanted-text">
        <p>have u seen this cat?</p>
    </div>

    <div class="dead-or-alive">
        <p>WANTED DEAD OR ALIVE</p>
    </div>

    <a href="cat-in-box.html" class="arrow">→</a>

</body>
</html>
